<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Negozio Vestiti Top</title>
    <style>
        /* Design moderno e pulito */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 30px;
            max-width: 400px;
            border: 1px solid #eee;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        p {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }
        .btn-whatsapp {
            background-color: #25D366; /* Colore ufficiale WhatsApp */
            color: white;
            text-decoration: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            transition: transform 0.3s ease;
        }
        .btn-whatsapp:hover {
            transform: scale(1.05);
            background-color: #128C7E;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Negozio Vestiti Top 👗</h1>
        <p>I migliori brand, selezionati per te. Qualità garantita e stile unico.</p>
        
        <a href="https://wa.me/393209420338?text=Ciao!%20Vorrei%20informazioni%20sui%20vestiti" class="btn-whatsapp">

        <div class="footer">

</body>
