<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique Top Style</title>
    <style>
        * { margin: 0; padding: 0; box-word: border-box; }
        body { font-family: 'Helvetica Neue', sans-serif; background-color: #fafafa; color: #333; line-height: 1.6; }
        
        /* Header con Immagine */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
            height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .hero h1 { font-size: 2.5rem; text-transform: uppercase; letter-spacing: 3px; }

        /* Sezione Prodotti */
        .content { padding: 40px 20px; max-width: 800px; margin: auto; }
        .section-title { text-align: center; margin-bottom: 30px; font-weight: 300; font-size: 1.5rem; color: #555; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card-info { padding: 10px; text-align: center; }
        .price { color: #e67e22; font-weight: bold; }

        /* Bottone WhatsApp Fisso */
        .cta-container { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; padding: 0 20px; }
        .btn-wa { 
            background-color: #25D366; color: white; text-decoration: none; 
            padding: 15px 30px; border-radius: 50px; font-weight: bold; 
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3); width: 100%; max-width: 300px; text-align: center;
        }
    </style>
</head>
<body>

    <header class="hero">
        <h1>TOP STYLE</h1>
        <p>L'eleganza a portata di click</p>
    </header>

    <div class="content">
        <h2 class="section-title">Nuovi Arrivi</h2>
        
        <div class="grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1539109136881-3be0616acf4b?auto=format&fit=crop&w=300&q=80" alt="Abito">
                <div class="card-info">
                    <p>Abito Gala</p>
                    <p class="price">€ 89,00</p>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?auto=format&fit=crop&w=300&q=80" alt="Giacca">
                <div class="card-info">
                    <p>Giacca Casual</p>
                    <p class="price">€ 120,00</p>
                </div>
            </div>
        </div>
    </div>

    <div class="cta-container">
        <a href="https://wa.me/393330000000?text=Ciao!%20Voglio%20ordinare%20dal%20sito" class="btn-wa">
            💬 ORDINA ORA SU WHATSAPP
        </a>
    </div>

</body>
</html>
